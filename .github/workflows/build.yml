name: Build and Push to GCP Artifact Registry

on:
  push:
    branches:
      - bh-main
      - bh-dev
      - mh-main
      - mh-dev
  pull_request:
    branches:
      - bh-main
      - bh-dev
      - mh-main
      - mh-dev

env:
  BASE_IMAGE_NAME: oan-telemetry-dashboard-app

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.17.1'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  docker-push:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    environment: ${{ github.ref_name }}
    
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: package-version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Set image name and tags based on branch
        id: set-tags
        run: |
          BRANCH="${{ github.ref_name }}"
          # Extract environment prefix (bh/mh) and build type (main/dev)
          ENV_PREFIX=$(echo "$BRANCH" | cut -d'-' -f1)
          BUILD_TYPE=$(echo "$BRANCH" | cut -d'-' -f2)
          
          echo "IMAGE_NAME=${ENV_PREFIX}-${{ env.BASE_IMAGE_NAME }}" >> $GITHUB_OUTPUT
          echo "BUILD_TAG=${BUILD_TYPE}" >> $GITHUB_OUTPUT
          echo "LATEST_TAG=${BUILD_TYPE}-latest" >> $GITHUB_OUTPUT

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate runtime config from secrets
        run: |
          cat > public/config.js << 'EOF'
          window.__APP_CONFIG__ = {
            KEYCLOAK_URL: "${{ secrets.KEYCLOAK_URL }}",
            KEYCLOAK_REALM: "${{ secrets.KEYCLOAK_REALM }}",
            KEYCLOAK_CLIENT_ID: "${{ secrets.KEYCLOAK_CLIENT_ID }}",
            API_SERVER_URL: "${{ secrets.API_SERVER_URL }}",
            WATCHTOWER_BASE_URL: "${{ secrets.WATCHTOWER_BASE_URL }}",
            WATCHTOWER_JWT: "${{ secrets.WATCHTOWER_JWT }}",
          };
          EOF

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/${{ steps.set-tags.outputs.IMAGE_NAME }}:${{ steps.set-tags.outputs.LATEST_TAG }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/${{ steps.set-tags.outputs.IMAGE_NAME }}:${{ steps.package-version.outputs.VERSION }}-${{ steps.set-tags.outputs.BUILD_TAG }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/${{ steps.set-tags.outputs.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/${{ steps.set-tags.outputs.IMAGE_NAME }}:${{ steps.set-tags.outputs.BUILD_TAG }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

